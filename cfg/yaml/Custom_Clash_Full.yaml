# Custom_OpenClash_Rules
# 全分组防 DNS 泄漏 Clash 配置文件
# 作者：https://github.com/Aethersailor
# 项目地址：https://github.com/Aethersailor/Custom_OpenClash_Rules
# 本配置为 Full 模板转换版本，可自由添加规则和分组

# 端口配置
port: 7890
socks-port: 7891
mixed-port: 7892
allow-lan: true
bind-address: "*"
mode: rule
log-level: info
ipv6: true
external-controller: 0.0.0.0:9090
secret: ""

# DNS 配置
dns:
  enable: true
  ipv6: true
  listen: 0.0.0.0:53
  enhanced-mode: fake-ip
  fake-ip-range: 198.18.0.1/16
  fake-ip-filter:
    - "*.lan"
    - "*.localdomain"
    - "*.example"
    - "*.invalid"
    - "*.localhost"
    - "*.test"
    - "*.local"
  nameserver:
    - 223.5.5.5
    - 119.29.29.29
    - tls://dns.alidns.com:853
  fallback:
    - https://1.1.1.1/dns-query
    - https://dns.google/dns-query
    - tls://8.8.8.8:853
  fallback-filter:
    geoip: true
    geoip-code: CN

# 代理节点（需要从订阅导入或手动添加）
proxies:

# 代理组配置
proxy-groups:
