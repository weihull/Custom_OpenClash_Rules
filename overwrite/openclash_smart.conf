# ==========================================================
# OpenClash 覆写模块配置 - Smart 内核版本
# 基于 Custom_Clash_Full 配置，优化规则订阅源
# ==========================================================

[General]
# CONFIG_FILE (原始配置文件路径，指定 OpenClash 下载并覆写的 YAML 配置文件)
CONFIG_FILE = /etc/openclash/config/Custom_Clash_Full.yaml

# CORE_TYPE (核心类型，Smart 或 Meta)
CORE_TYPE = Smart

# --- DNS 相关 ---
# ENABLE_REDIRECT_DNS (DNS 重定向模式，0：禁用，1：Dnsmasq Redirect，2：Firewall Redirect)
ENABLE_REDIRECT_DNS = 2
# ENABLE_CUSTOM_DNS (自定义 DNS，0：插件不覆写，1：启用并使用插件内置规则)
ENABLE_CUSTOM_DNS = 1
# APPEND_DEFAULT_DNS (自动追加 default-nameserver DNS，0：插件不覆写，1：启用)
APPEND_DEFAULT_DNS = 0
# APPEND_WAN_DNS (追加上游分配 DNS，0：插件不覆写，1：启用)
APPEND_WAN_DNS = 1
# STORE_FAKEIP (启用 fake-ip 缓存，0：插件不覆写，1：启用)
STORE_FAKEIP = 1
# CUSTOM_FAKEIP_FILTER (启用 Fake-IP-Filter，0：插件不覆写，1：启用并使用插件内置规则)
CUSTOM_FAKEIP_FILTER = 1
# CUSTOM_FAKEIP_FILTER_MODE (Fake-IP 过滤模式，blacklist 或 whitelist)
CUSTOM_FAKEIP_FILTER_MODE = blacklist
# FAKEIP_RANGE (自定义 Fake-IP 地址段，例如 198.18.0.1/16)
FAKEIP_RANGE = 198.18.0.1/16
# ENABLE_RESPECT_RULES (DNS 查询是否遵循规则，0：插件不覆写，1：启用)
ENABLE_RESPECT_RULES = 0
# CUSTOM_NAME_POLICY (自定义 Nameserver-Policy，0：插件不覆写，1：启用并使用插件内置规则)
CUSTOM_NAME_POLICY = 0
# CUSTOM_HOST (自定义 Hosts，0：插件不覆写，1：启用并使用插件内置规则)
CUSTOM_HOST = 0
# CUSTOM_FALLBACK_FILTER (自定义 Fallback-Filter，0：插件不覆写，1：启用并使用插件内置规则)
CUSTOM_FALLBACK_FILTER = 0

# --- IPv6 相关 ---
# IPV6_ENABLE (启用 IPv6，0：禁用，1：启用)
IPV6_ENABLE = 1
# IPV6_DNS (启用 IPv6 DNS，0：禁用，1：启用)
IPV6_DNS = 1
# IPV6_MODE (IPv6 代理模式, 0: TProxy Mode, 1: Redirect Mode, 2: TUN Mode, 3: Mix Mode)
IPV6_MODE = 2
# CHINA_IP6_ROUTE (IPv6 绕过 IP 模式，0：禁用，1：绕过大陆，2：回国)
CHINA_IP6_ROUTE = 1

# --- 代理与模式 ---
# EN_MODE (插件运行模式，fake-ip/fake-ip-tun/fake-ip-mix 或 redir-host/redir-host-tun/redir-host-mix)
EN_MODE = fake-ip-tun
# ENABLE_UDP_PROXY (启用 UDP 代理，0：禁用，1：启用；仅在非 TUN 模式下有效)
ENABLE_UDP_PROXY = 0
# DISABLE_UDP_QUIC (禁用 UDP QUIC，0：启用 QUIC，1：禁用 QUIC)
DISABLE_UDP_QUIC = 0
# ROUTER_SELF_PROXY (路由器自身代理，0：禁用，1：启用)
ROUTER_SELF_PROXY = 1
# STACK_TYPE (TUN 网络栈类型, system/gvisor/mixed, default is system)
STACK_TYPE = system
# PROXY_MODE (代理模式，rule/global/direct，默认 rule)
PROXY_MODE = rule

# --- 防火墙与访问控制 ---
# INTRANET_ALLOWED (仅允许内网访问，0：禁用，1：启用)
INTRANET_ALLOWED = 0
# BYPASS_GATEWAY_COMPATIBLE (旁路网关兼容模式，0：禁用，1：启用)
BYPASS_GATEWAY_COMPATIBLE = 0
# COMMON_PORTS (绕过常用端口的端口列表, 0: 禁用 or "21 22 23 53 80 123 143 194 443 465 587 853 993 995 998 2052 2053 2082 2083 2086 2095 2096 5222 5228 5229 5230 8080 8443 8880 8888 8889")
COMMON_PORTS = 0

# --- 分流相关 ---
# CHINA_IP_ROUTE (IPv4 绕过 IP 模式，0：禁用，1：绕过大陆，2：回国)
CHINA_IP_ROUTE = 1
# CHINA_IP6_ROUTE (IPv6 绕过 IP 模式, 0: 禁用, 1: 绕过大陆, 2: 回国)
CHINA_IP6_ROUTE = 1
# CHNR_AUTO_UPDATE (大陆 IP 自动更新，0：禁用，1：启用)
CHNR_AUTO_UPDATE = 1
# CHNR_UPDATE_WEEK_TIME (大陆 IP 更新时间，0-6 或 *；0 代表星期天，* 代表每天)
CHNR_UPDATE_WEEK_TIME = *
# CHNR_UPDATE_DAY_TIME (大陆 IP 更新小时，0-23 或 *)
CHNR_UPDATE_DAY_TIME = 0

# ENABLE_META_SNIFFER (启用域名嗅探，0：插件不覆写，1：启用)
ENABLE_META_SNIFFER = 1
# ENABLE_META_SNIFFER_CUSTOM (启用自定义嗅探规则，0：插件不覆写，1：启用并使用插件内置规则)
ENABLE_META_SNIFFER_CUSTOM = 1
# ENABLE_META_SNIFFER_PURE_IP (强制嗅探纯 IP 连接，0：插件不覆写，1：启用)
ENABLE_META_SNIFFER_PURE_IP = 1

# ENABLE_TCP_CONCURRENT (启用 TCP 并发，0：插件不覆写，1：启用)
ENABLE_TCP_CONCURRENT = 1
# FIND_PROCESS_MODE (进程查找模式，0：插件不覆写，off：关闭，always：总是，strict：严格)
FIND_PROCESS_MODE = 0
# ENABLE_UNIFIED_DELAY (启用统一延迟计算，0：插件不覆写，1：启用)
ENABLE_UNIFIED_DELAY = 1

# ENABLE_RULE_PROXY (仅代理命中规则流量，0：禁用，1：启用)
ENABLE_RULE_PROXY = 0
# ENABLE_CUSTOM_CLASH_RULES (启用用户自定义规则，0：禁用，1：启用并使用插件规则)
ENABLE_CUSTOM_CLASH_RULES = 1

# --- URL-Test 相关 ---
# TOLERANCE (URL-Test 策略组切换灵敏度，毫秒数；0 或 default 表示不覆写)
TOLERANCE = 50
# URLTEST_INTERVAL_MOD (测速/连通性检测间隔，秒数；0 或 default 表示不覆写)
URLTEST_INTERVAL_MOD = 300
# URLTEST_ADDRESS_MOD (测速（连通性）地址修改, URL or default 0 不覆写)
URLTEST_ADDRESS_MOD = https://www.gstatic.com/generate_204

# --- Smart 相关（核心功能）---
# AUTO_SMART_SWITCH (启用 Smart 自动切换, 0: 插件不覆写, 1: 启用)
AUTO_SMART_SWITCH = 1
# SMART_ENABLE_LGBM (启用 LightGBM 模型, 0: 插件不覆写, 1: 启用)
SMART_ENABLE_LGBM = 0
# SMART_POLICY_PRIORITY (节点权重加成, 正则或字符，格式：Premium:0.9;SG:1.3)
SMART_POLICY_PRIORITY = Premium:1.2;Pro:1.2;IPLC:1.3;IEPL:1.3;专线:1.3
# SMART_PREFER_ASN (强制查找并使用 ASN 信息, 0: 插件不覆写, 1: 启用)
SMART_PREFER_ASN = 0
# SMART_COLLECT (模型训练数据收集, 0: 插件不覆写, 1: 启用)
SMART_COLLECT = 1
    # SMART_COLLECT_SIZE (模型训练数据收集的文件大小, MB, 数值 or default 100)
    SMART_COLLECT_SIZE = 500
    # SMART_COLLECT_RATE (模型训练数据收集的采样率, 0-1 or default 1)
    SMART_COLLECT_RATE = 0.8
# LGBM_AUTO_UPDATE (LGBM 模型自动更新, 0: 插件不覆写, 1: 启用)
LGBM_AUTO_UPDATE = 0
    # LGBM_UPDATE_INTERVAL (LGBM 模型更新间隔, 小时数 or default 72)
    # LGBM_UPDATE_INTERVAL = 168
    # LGBM_CUSTOM_URL (LGBM 模型自定义下载 URL (URL 地址 or default)
    # LGBM_CUSTOM_URL = default

# --- 数据库加载相关 ---
# ENABLE_GEOIP_DAT (启用 GEOIP DAT 数据库，0：插件不覆写，1：启用)
ENABLE_GEOIP_DAT = 1
# GEODATA_LOADER (Geo 数据加载模式，memconservative/standard/0；0 表示插件不覆写)
GEODATA_LOADER = 0
# GEO_AUTO_UPDATE (GeoIP MMDB 数据自动更新，0：禁用，1：启用)
GEO_AUTO_UPDATE = 1
# GEO_UPDATE_WEEK_TIME (GeoIP MMDB 数据更新日，0-6 或 *；0 代表星期天，* 代表每天)
GEO_UPDATE_WEEK_TIME = *
# GEO_UPDATE_DAY_TIME (GeoIP MMDB 数据更新小时，0-23 或 *)
GEO_UPDATE_DAY_TIME = 1
# GEOIP_AUTO_UPDATE (GeoIP Dat 数据自动更新，0：禁用，1：启用)
GEOIP_AUTO_UPDATE = 1
# GEOIP_UPDATE_WEEK_TIME (GeoIP Dat 数据更新日，0-6 或 *；0 代表星期天，* 代表每天)
GEOIP_UPDATE_WEEK_TIME = *
# GEOIP_UPDATE_DAY_TIME (GeoIP Dat 数据更新小时，0-23 或 *)
GEOIP_UPDATE_DAY_TIME = 2
# GEOSITE_AUTO_UPDATE (GeoSite 数据自动更新，0：禁用，1：启用)
GEOSITE_AUTO_UPDATE = 1
# GEOSITE_UPDATE_WEEK_TIME (GeoSite 数据更新日，0-6 或 *；0 代表星期天，* 代表每天)
GEOSITE_UPDATE_WEEK_TIME = *
# GEOSITE_UPDATE_DAY_TIME (GeoSite 数据更新小时，0-23 或 *)
GEOSITE_UPDATE_DAY_TIME = 3
# GEOASN_AUTO_UPDATE (GeoASN 数据自动更新，0：禁用，1：启用)
GEOASN_AUTO_UPDATE = 1
# GEOASN_UPDATE_WEEK_TIME (GeoASN 数据更新日，0-6 或 *；0 代表星期天，* 代表每天)
GEOASN_UPDATE_WEEK_TIME = *
# GEOASN_UPDATE_DAY_TIME (GeoASN 数据更新小时，0-23 或 *)
GEOASN_UPDATE_DAY_TIME = 4

# --- 其它功能 ---
# GLOBAL_UA (全局 User-Agent, 0:不覆写，或具体 UA)
GLOBAL_UA = 0
# SMALL_FLASH_MEMORY (小闪存模式，0：禁用，1：启用)
SMALL_FLASH_MEMORY = 0
# DISABLE_QUIC_GO_GSO (禁用 QUIC GO GSO，0：插件不覆写，1：启用)
DISABLE_QUIC_GO_GSO = 0
# DELAY_START (延时启动，0：禁用，或填写秒数)
DELAY_START = 0
# SKIP_PROXY_ADDRESS (跳过代理地址，0：禁用，1：启用)
SKIP_PROXY_ADDRESS = 1
# SUB_INFO_URL (订阅信息 URL；这里使用 EN_KEY 环境变量展示订阅信息)
SUB_INFO_URL = $EN_KEY
# DOWNLOAD_FILE (下载外部 YAML 到指定路径；force=true 表示强制下载，restart=false 表示下载后不再次重启)
DOWNLOAD_FILE = url=https://raw.githubusercontent.com/weihull/Custom_OpenClash_Rules/main/cfg/yaml/Custom_Clash_Full.yaml, path=/etc/openclash/config/Custom_Clash_Full.yaml, cron=0 6 * * *, force=true, RESTART=true

[Overwrite]
# ruby_map_edit (将 Custom_Clash_Full.yaml 中 proxy-providers.Sub-Store.url 替换为 EN_KEY)
ruby_map_edit "$CONFIG_FILE" "['proxy-providers']" "# =========================================
#                锚点配置
# =========================================
anchor:
  # 代理提供商锚点
  BaseProvider: &BaseProvider
    type: http
    interval: 3600
    proxy: DIRECT
    health-check:
      enable: true
      url: "https://g.cn/generate_204"
      interval: 10
    override:
      skip-cert-verify: true
      udp: true
    path: ./proxy_provider/provider.yaml
    filter: >-
      ^(?!.*(群|邀请|返利|循环|官网|客服|网站|网址|获取|订阅|流量|到期|机场|下次|版本|官址|备用|过期|已用|联系|邮箱|工单|贩卖|通知|倒卖|防止|国内|地址|频道|无法|说明|使用|提示|特别|访问|支持|教程|关注|更新|作者|加入|USE|USED|TOTAL|EXPIRE|EMAIL|Panel|Channel|Author)).*$

  # 策略组类型模板
  BaseURL-test: &BaseURL-test
    type: url-test
    include-all: true
    tolerance: 20
    interval: 120
    url: https://cp.cloudflare.com/generate_204
    hidden: true

  # 节点筛选正则
  # 香港
  FilterHK: &FilterHK >-
    ^(?=.*(?i)(港|🇭🇰|HK|Hong|HKG)).*$
  # 新加坡
  FilterSG: &FilterSG >-
    ^(?=.*(?i)(坡|🇸🇬|SG|Sing|SIN|XSP)).*$
  # 日本
  FilterJP: &FilterJP >-
    ^(?=.*(?i)(日|🇯🇵|JP|Japan|NRT|HND|KIX|CTS|FUK)).*$
  # 美国
  FilterUS: &FilterUS >-
    ^(?=.*(?i)(美|🇺🇸|US|USA|SJC|JFK|LAX|ORD|ATL|DFW|SFO|MIA|SEA|IAD)).*$
  # 台湾
  FilterTW: &FilterTW >-
    ^(?=.*(?i)(台|🇼🇸|🇹🇼|TW|tai|TPE|TSA|KHH)).*$

# 策略组代理列表模板 - 预定义的代理节点优先级排序
  SelectAU: &SelectAU
    type: url-test
    include-all: true
    tolerance: 20
    interval: 120
    filter: "^((?!(直连)).)*$"

  SelectMS: &SelectMS
    type: select
    proxies:
      - 香港节点
      - 美国节点
      - 日本节点
      - 新加坡节点
      - 台湾节点
      - 自动选择
      - 全球直连
    use:
      - Sub-store

  SelectMH: &SelectMH
    type: select
    proxies:
      - 香港节点
      - 美国节点
      - 新加坡节点
      - 日本节点
      - 台湾节点
      - 手动选择
      - 自动选择
      - 全球直连
    use:
      - Sub-store

  SelectHK: &SelectHK
    type: select
    proxies:
      - 香港节点
      - 美国节点
      - 新加坡节点
      - 日本节点
      - 台湾节点
      - 手动选择
      - 自动选择
      - 全球直连

  SelectUS: &SelectUS
    type: select
    proxies:
      - 美国节点
      - 香港节点
      - 新加坡节点
      - 日本节点
      - 台湾节点
      - 手动选择
      - 自动选择
      - 全球直连

  SelectSG: &SelectSG
    type: select
    proxies:
      - 新加坡节点
      - 香港节点
      - 美国节点
      - 日本节点
      - 台湾节点
      - 手动选择
      - 自动选择
      - 全球直连

  SelectJP: &SelectJP
    type: select
    proxies:
      - 日本节点
      - 香港节点
      - 美国节点
      - 新加坡节点
      - 台湾节点
      - 手动选择
      - 自动选择
      - 全球直连

  SelectTW: &SelectTW
    type: select
    proxies:
      - 台湾节点
      - 香港节点
      - 美国节点
      - 新加坡节点
      - 日本节点
      - 手动选择
      - 自动选择
      - 全球直连

# 规则提供者模板
  ip: &ip
    type: http
    interval: 86400
    behavior: ipcidr
    format: mrs

  domain: &domain
    type: http
    interval: 86400
    behavior: domain
    format: mrs

  class: &class
    type: http
    interval: 86400
    behavior: classical
    format: text

# =========================================
#              代理提供商
# =========================================
proxy-providers:
  Sub-store:
    <<: *BaseProvider
    url: "url"

